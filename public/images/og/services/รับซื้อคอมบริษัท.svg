  <text x="600" y="200" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="48" font-weight="700"><tspan x="600" dy="0">รับซื้อคอมพิวเตอร์บริษัท</tspan><tspan x="600" dy="44">คอมตั้งโต๊ะ</tspan></text>
